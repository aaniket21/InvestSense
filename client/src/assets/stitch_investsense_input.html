<script>
        document.getElementById('researchForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalContent = btn.innerHTML;
            
            // Simple visual feedback
            btn.innerHTML = `<span>Processing...</span><span class="material-symbols-outlined animate-spin" data-icon="sync">sync</span>`;
            btn.style.opacity = '0.7';
            
            setTimeout(() => {
                btn.innerHTML = originalContent;
                btn.style.opacity = '1';
                alert('Research query submitted to the engine.');
            }, 1500);
        });

        // Floating label effect or simple focus aesthetic
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.querySelector('label').style.color = '#1F2E2B';
            });
            input.addEventListener('blur', () => {
                input.parentElement.querySelector('label').style.color = '';
            });
        });
    </script>
